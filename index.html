<!DOCTYPE html>
<html lang="es">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#141414;--s:#1c1c1c;--b:rgba(255,255,255,.09);
  --t:#fafafa;--m:rgba(255,255,255,.38);--or:#F97316;--go:#E8A020}
html,body{min-height:100%;background:var(--bg);color:var(--t);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

.hdr{padding:52px 16px 12px;display:flex;align-items:center;gap:10px}
.hdr-ico{width:36px;height:36px;background:rgba(232,160,32,.14);border-radius:11px;
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr h1{font-size:18px;font-weight:600;color:var(--go)}
.hdr p{font-size:11px;color:var(--m);margin-top:1px}

.card{background:var(--s);border:.5px solid var(--b);border-radius:16px;
  margin:0 16px 12px;padding:16px}
.card-title{font-size:11px;font-weight:600;color:var(--or);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:12px;opacity:.7}

.row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.row label{font-size:12px;color:var(--m);flex-shrink:0;min-width:56px}
input[type=date]{flex:1;background:rgba(255,255,255,.05);border:.5px solid var(--b);

  -webkit-appearance:none;font-family:inherit}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.4}
input[type=text]{flex:1;background:rgba(255,255,255,.05);border:.5px solid var(--b);
  border-radius:10px;padding:9px 12px;font-size:13px;color:var(--t);outline:none;
  font-family:inherit}
input[type=text]::placeholder{color:var(--m)}

.toggle{display:flex;background:rgba(255,255,255,.04);border-radius:10px;padding:3px;flex:1}
.toggle button{flex:1;border:none;background:transparent;color:var(--m);font-size:12px;
  padding:7px;border-radius:8px;cursor:pointer;transition:all .15s;font-family:inherit}
.toggle button.on{background:var(--or);color:#fff;font-weight:600}

.btn-main{width:100%;background:var(--go);color:#111;border:none;border-radius:12px;

.btn-main:active{opacity:.8}
.btn-main:disabled{opacity:.4;cursor:default}

.estado{text-align:center;color:var(--m);font-size:13px;padding:32px 16px;display:none}

@keyframes sp{to{transform:rotate(360deg)}}

.ph{display:flex;justify-content:space-between;align-items:flex-start}
.pn{font-size:14px;font-weight:600;flex:1;line-height:1.3;color:var(--go)}
.pb{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;

.pb.inter{background:rgba(232,160,32,.15);color:var(--go)}
.pi{display:flex;flex-wrap:wrap;gap:5px}
.pt{font-size:11px;color:var(--m);background:rgba(255,255,255,.04);

.pa{display:flex;gap:6px;flex-wrap:wrap}
.bpdf{flex:1;background:var(--or);color:#fff;border:none;border-radius:10px;
  padding:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:5px;min-width:0}
.bpdf:active{opacity:.8}
.bpdf:disabled{opacity:.4;cursor:default}
.bwa{background:rgba(232,160,32,.13);color:var(--go);border:.5px solid rgba(232,160,32,.25);

.bpreq{background:rgba(249,115,22,.10);color:var(--or);border:.5px solid rgba(249,115,22,.22);

.preq-p{background:rgba(232,160,32,.06);border:.5px solid rgba(232,160,32,.2);

.preq-p.open{display:flex}
.preq-tit{font-size:11px;font-weight:600;color:var(--go);text-transform:uppercase;letter-spacing:.5px}
.preq-fix{font-size:11px;color:var(--m)}
.preq-opt{display:flex;align-items:center;gap:8px}

.preq-opt label{font-size:12px;cursor:pointer}
.bpreq-g{width:100%;background:rgba(232,160,32,.18);color:var(--go);border:none;
  border-radius:8px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;

.alerta30{margin:0 16px 12px;border-radius:14px;overflow:hidden}
.alerta30-hdr{background:rgba(234,179,8,.12);border:.5px solid rgba(234,179,8,.25);
  border-radius:14px 14px 0 0;padding:12px 16px;display:flex;align-items:center;

.alerta30-ico{color:#fbbf24;font-size:14px;transition:transform .2s}
.alerta30-ico.open{transform:rotate(180deg)}
.alerta30-body{background:rgba(234,179,8,.05);border:.5px solid rgba(234,179,8,.18);
  border-top:none;border-radius:0 0 14px 14px;padding:10px 14px;display:none}
.alerta30-body.open{display:block}
.a30-search{width:100%;background:rgba(255,255,255,.05);border:.5px solid var(--b);

  font-family:inherit;margin-bottom:8px}

.a30-row{display:flex;flex-direction:column;gap:2px;padding:8px 0;
  border-bottom:.5px solid rgba(255,255,255,.07)}
.a30-row:last-child{border-bottom:none}
.a30-nombre{font-size:13px;font-weight:600;color:#fbbf24}
.a30-detalle{font-size:11px;color:var(--m);display:flex;gap:10px;flex-wrap:wrap;margin-top:2px}
.a30-dias{font-size:11px;font-weight:700;color:#f97316;background:rgba(249,115,22,.12);
  padding:2px 7px;border-radius:10px;display:inline-block;margin-top:2px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--or);color:#fff;padding:10px 22px;border-radius:20px;
  font-size:13px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── PALETAS DE COLOR ── */
.theme-dots{display:flex;gap:6px;align-items:center;margin-left:auto;padding-right:2px}
.tdot{width:19px;height:19px;border-radius:50%;border:2px solid transparent;cursor:pointer;

.tdot.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.4);transform:scale(1.15)}
[data-theme="cielo"]{--or:#0ea5e9;--go:#38bdf8}

.stats-htxt h2{font-size:17px;font-weight:600;color:var(--go)}

.stats-sec{background:var(--s);border:.5px solid var(--b);border-radius:16px;margin:0 16px 12px;padding:16px}
.stats-sec-t{font-size:11px;font-weight:600;color:var(--or);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;opacity:.7}
.st{width:100%;border-collapse:collapse}
.st th{font-size:10px;font-weight:600;color:var(--m);text-align:left;padding:5px 6px;border-bottom:.5px solid var(--b);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.st td{font-size:12px;padding:8px 6px;border-bottom:.5px solid rgba(255,255,255,.04)}
.st tr:last-child td{border-bottom:none}
.st .nt{font-weight:700;color:var(--or);text-align:right}
.st .dn{font-weight:600;color:var(--go)}
.sdc{background:var(--s);border:.5px solid var(--b);border-radius:14px;margin:0 16px 10px;padding:14px;border-left:2px solid rgba(232,160,32,.35)}
.sdc-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.sdc-name{font-size:14px;font-weight:600;color:var(--go)}
.sdc-tot{font-size:22px;font-weight:700;color:var(--or)}
.sdc-ico{font-size:11px;color:var(--m);transition:.2s;margin-left:6px}
.sdc-body{display:none;margin-top:12px;padding-top:12px;border-top:.5px solid var(--b)}

.sdc-sub{font-size:10px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px}
.sdc-sub:first-child{margin-top:0}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.blbl{font-size:10px;color:var(--m);min-width:72px;max-width:72px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bbg{flex:1;height:11px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden}
.bfill{height:100%;background:var(--or);border-radius:5px}
.bval{font-size:10px;color:var(--m);min-width:22px;flex-shrink:0;text-align:right}
.trend{display:flex;align-items:flex-end;gap:4px;height:60px}
.tbar-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;justify-content:flex-end}
.tbar{width:100%;background:var(--or);border-radius:2px 2px 0 0;opacity:.8}
.tbar.curr{background:var(--go);opacity:1}
.tlbl{font-size:8px;color:var(--m);flex-shrink:0}
/* Password */
.pw-ol{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:none;align-items:center;justify-content:center}
.pw-ol.open{display:flex}
.pw-box{background:var(--s);border:.5px solid var(--b);border-radius:20px;padding:28px 24px;width:min(300px,88vw);display:flex;flex-direction:column;gap:12px}
.pw-title{font-size:14px;font-weight:600;color:var(--go);text-align:center}
.pw-inp{background:rgba(255,255,255,.06);border:.5px solid var(--b);border-radius:10px;padding:11px;font-size:15px;color:var(--t);outline:none;font-family:inherit;text-align:center;letter-spacing:3px;width:100%}
.pw-inp:focus{border-color:var(--or)}
.pw-err{font-size:11px;color:#ef4444;text-align:center;min-height:14px}
.pw-ok{background:var(--or);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.pw-cancel{background:rgba(255,255,255,.05);color:var(--m);border:none;border-radius:10px;padding:9px;font-size:12px;cursor:pointer;font-family:inherit;width:100%}
.stats-btn-hdr{background:none;border:.5px solid rgba(249,115,22,.35);color:var(--or);border-radius:8px;padding:5px 9px;font-size:13px;cursor:pointer;flex-shrink:0;line-height:1}
.stats-btn-hdr:active{opacity:.7}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-ico">🏥</div>
  <div style="flex:1"><h1>Generador de Órdenes</h1><p>CEOT – Clínica Colón</p></div>
  <div class="theme-dots">
    <button class="tdot" data-theme="" style="background:#F97316" onclick="setTheme('')" title="Naranja"></button>
    <button class="tdot" data-theme="cielo" style="background:#0ea5e9" onclick="setTheme('cielo')" title="Cielo"></button>
    <button class="tdot" data-theme="menta" style="background:#10b981" onclick="setTheme('menta')" title="Menta"></button>
    <button class="tdot" data-theme="melocoton" style="background:#f59e0b" onclick="setTheme('melocoton')" title="Melocotón"></button>
    <button class="tdot" data-theme="rosa" style="background:#f472b6" onclick="setTheme('rosa')" title="Rosa"></button>
  </div>
  <button class="stats-btn-hdr" onclick="abrirStats()" title="Estadísticas">📊</button>
</div>

<div class="card">
  <div class="card-title">Filtro</div>
  <div class="row">
    <label>Fecha</label>
    <input type="date" id="iDate">
  </div>
  <div class="row">
    <label>Paciente</label>
    <input type="text" id="iNombre" placeholder="Apellido o nombre..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="row">
    <label>Modo</label>
    <div class="toggle">
      <button class="on" id="bCarga" onclick="setModo('carga')">Fecha carga</button>

<!-- Password overlay -->

  <div class="pw-box">
    <div class="pw-title">📊 Estadísticas CEOT</div>
    <input class="pw-inp" type="password" id="pwInp" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')checkPw()" autocomplete="off">

<!-- Stats overlay -->
<div class="stats-ol" id="statsOl">

    <button class="stats-back" onclick="cerrarStats()">←</button>
    <div class="stats-htxt">
      <h2>Estadísticas</h2>

    </div>
  </div>
  <div class="stats-sec" style="margin-bottom:8px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;gap:6px;align-items:center;flex:1;min-width:0">

        <input type="date" id="statsDesde" style="flex:1;min-width:0">
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex:1;min-width:0">
        <label style="font-size:11px;color:var(--m);flex-shrink:0">Hasta</label>
        <input type="date" id="statsHasta" style="flex:1;min-width:0">
      </div>
      <button onclick="aplicarFiltroStats()" style="background:var(--or);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0">Aplicar</button>
    </div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:10px">
      <label style="font-size:11px;color:var(--m);flex-shrink:0">Profesional</label>
      <select id="statsDocFiltro" onchange="filtrarDocStats(this.value)"
        style="flex:1;background:rgba(255,255,255,.05);border:.5px solid var(--b);border-radius:10px;padding:8px 10px;font-size:12px;color:var(--t);outline:none;font-family:inherit">
        <option value="">Todos</option>
      </select>
    </div>
  </div>
  <div id="statsContent"><div class="estado" style="display:block"><span class="spin"></span>Cargando...</div></div>
  <div class="spacer"></div>

<script>
const { jsPDF } = window.jspdf

const PW=11, PH=22, ML=0.55, MR=PW-0.45, CX=PW/2, LBL=ML+0.20
const PT=0.03528
const WA='5492235760730'
const SHEET_URL='https://docs.google.com/spreadsheets/d/1VYIarOpfCgqinj5Uy2dAYCSsx6c5GL9J7YbAYKvCbdk/export?format=csv'
const PROXY='https://corsproxy.io/?'

let modo='carga', logoB64=null, logoCEOTB64=null
const DIMS={}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('iDate').value = todayISO()
  preloadDims()
})

function todayISO() {
  const d=new Date(); return d.toISOString().slice(0,10)
}

function setModo(m) {
  modo=m
  document.getElementById('bCarga').classList.toggle('on',m==='carga')
  document.getElementById('bCirugia').classList.toggle('on',m==='cirugia')
}

async function preloadDims() {
  if(typeof IMAGENES==='undefined') return
  const load=(k,src)=>new Promise(r=>{
    const img=new Image()
    img.onload=()=>{DIMS[k]={w:img.naturalWidth,h:img.naturalHeight};r()}
    img.onerror=r; img.src=src
  })
  await Promise.all([
    ...Object.entries(IMAGENES.sellos||{}).map(([k,s])=>load('s_'+k,s)),
    ...Object.entries(IMAGENES.firmas||{}).map(([k,s])=>load('f_'+k,s))
  ])
}

function parseCSV(txt) {
  if(txt.charCodeAt(0)===0xFEFF) txt=txt.slice(1)
  txt=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n')
  const rows=[]; let i=0, n=txt.length
  while(i<n){
    const row=[]; let eol=false
    while(!eol && i<n){
      let cell=''
      if(txt[i]==='"'){
        i++
        while(i<n){
          if(txt[i]==='"' && txt[i+1]==='"'){cell+='"';i+=2}
          else if(txt[i]==='"'){i++;break}
          else{cell+=txt[i];i++}
        }
        if(txt[i]===',') i++
        else if(txt[i]==='\n'||i>=n) eol=true
      } else {
        while(i<n && txt[i]!==',' && txt[i]!=='\n'){cell+=txt[i];i++}
        if(txt[i]===',') i++
        else if(txt[i]==='\n'||i>=n) eol=true
      }
      row.push(cell.trim())
    }
    if(txt[i]==='\n') i++
    if(row.some(c=>c)) rows.push(row)
  }
  return rows
}

function parseFechaISO(s) {
  if(!s) return null; s=s.trim()
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/)
  return m?`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`:null
}

function normStr(s) {
  return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
}

function filtrar(rows, fechaISO, nombreFiltro) {
  const nf=normStr(nombreFiltro||'')
  const hoyStr=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'})
  return rows.slice(1).reduce((acc,row)=>{
    if(!row.some(c=>c)) return acc
    let ix
    if(row[1]?.trim()) ix={n:1,e:2,nu:3,d:4,m:5,co:6,nun:7,doc:9,fc:10,cel:11,ti:15,el:16,pq:14}
    else if(row[17]?.trim()) ix={n:17,e:18,nu:19,d:20,m:21,co:22,nun:23,doc:25,fc:24,cel:27,ti:30,el:32,pq:14}
    else return acc
    const g=i=>(row[i]||'').trim()
    if(fechaISO){
      const fISO=modo==='cirugia'?parseFechaISO(g(ix.fc)):parseFechaISO((row[0]||'').split(' ')[0])
      if(fISO!==fechaISO) return acc
    }
    const nombre=g(ix.n); if(!nombre) return acc
    if(nf&&!normStr(nombre).includes(nf)) return acc
    const fechaEmision=modo==='cirugia'?hoyStr:((row[0]||'').split(' ')[0]||hoyStr)
    acc.push({nombre,entidad:g(ix.e),num:g(ix.nu),diagnostico:g(ix.d),
      material:g(ix.m),codi:g(ix.co),nun:g(ix.nun),doctor:g(ix.doc),
      fecha_cirugia:g(ix.fc),celular:g(ix.cel),tipo:g(ix.ti),
      elementos:g(ix.el),necesita_preq:g(ix.pq),fecha_emision:fechaEmision})
    return acc
  },[])
}

const SK=['mazzola','guilera','deganutti','garmendia','bruni','bruna',
  'trivellini','perlasco','corelich','fisser','delacolina','labayen','leon','soule']

function normalizar(nombre) {
  const n=(nombre||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
  const ns=n.replace(/\s+/g,'')
  for(const k of SK) if(ns.includes(k)) return k
  for(const k of SK) if(n.includes(k)) return k
  for(const p of n.split(' ')) if(SK.includes(p)) return p
  return n
}
const FIRMA_EN_SELLO=['bruni','bruna','soule','trivellini','corelich','delacolina','labayen','perlasco','leon','mazzola','guilera','fisser','garmendia']
function getSello(doc) { return (IMAGENES?.sellos||{})[normalizar(doc)]||null }
function getFirma(doc) {
  const k=normalizar(doc)
  if(FIRMA_EN_SELLO.includes(k)) return null
  return (IMAGENES?.firmas||{})[k]||null
}

function crearLogo() {
  if(logoB64) return logoB64
  try{
    const SC=60
    const cv=document.createElement('canvas')
    cv.width=Math.ceil(11*SC); cv.height=Math.ceil(1.20*SC)
    const ctx=cv.getContext('2d')
    if(!ctx) return null
    const FS=13*PT*SC
    ctx.font=`bold ${FS}px Helvetica,Arial,sans-serif`
    const ir=0.42*SC, gap=0.22*SC
    const tw=ctx.measureText('Clinica Colon').width
    const cx=(11*SC-2*ir-gap-tw)/2+ir
    const cy=0.54*SC
    ctx.strokeStyle='#000'
    for(const [lw,r] of [[3*PT*SC,ir],[2.5*PT*SC,ir*.66],[2*PT*SC,ir*.35]]){
      ctx.lineWidth=lw
      ctx.beginPath(); ctx.arc(cx,cy,r,30*Math.PI/180,330*Math.PI/180,false); ctx.stroke()
    }
    const px=cx+ir*.88, pa=ir*.22
    ctx.lineWidth=1.2*PT*SC
    ctx.beginPath()
    ctx.moveTo(px-pa*1.4,cy); ctx.lineTo(px+pa*1.4,cy)
    ctx.moveTo(px,cy-pa*2);   ctx.lineTo(px,cy+pa*2)
    ctx.stroke()
    ctx.fillStyle='#000'
    ctx.font=`bold ${FS}px Helvetica,Arial,sans-serif`
    ctx.fillText('Clinica Colon',cx+ir+gap,cy+FS*0.35)
    logoB64=cv.toDataURL('image/png')
  }catch(e){ console.warn('Logo canvas error:',e); logoB64=null }
  return logoB64
}

function oscurecerImagen(src, factor) {
  // factor: 0=sin cambio, positivo=más oscuro (recomendado 0.5-1.5)
  try {
    const img = new Image()
    img.src = src
    const cv = document.createElement('canvas')
    cv.width = img.naturalWidth || 300; cv.height = img.naturalHeight || 300
    const ctx = cv.getContext('2d')
    ctx.drawImage(img, 0, 0)
    const id = ctx.getImageData(0, 0, cv.width, cv.height)
    const data = id.data
    for(let i=0; i<data.length; i+=4) {
      // sólo oscurecer píxeles no blancos/transparentes
      if(data[i+3] > 10) {
        data[i]   = Math.max(0, data[i]   - data[i]   * factor)
        data[i+1] = Math.max(0, data[i+1] - data[i+1] * factor)
        data[i+2] = Math.max(0, data[i+2] - data[i+2] * factor)
      }
    }
    ctx.putImageData(id, 0, 0)
    return cv.toDataURL('image/png')
  } catch(e) { return src }
}

function addImgFit(doc, src, dimKey, bx, bY_rl, bW, bH) {
  if(!src) return
  const srcOsc = oscurecerImagen(src, 0.55)
  const d=DIMS[dimKey]
  let rw=bW, rh=bH
  if(d){
    const ratio=d.w/d.h; rh=bW/ratio
    if(rh>bH){rh=bH;rw=bH*ratio}
  }
  const xi=bx+(bW-rw)/2
  const yi=(PH-bY_rl-bH)+(bH-rh)/2
  try{doc.addImage(srcOsc,'PNG',xi,yi,rw,rh,undefined,'FAST')}catch(e){}
}

function drawPage(doc, p, lineas, conFechaCirugia) {
  const sKey=normalizar(p.doctor)
  const sello=getSello(p.doctor), firma=getFirma(p.doctor)
  const fecha=p.fecha_emision||new Date().toLocaleDateString('es-AR')

  const logo=crearLogo()
  if(logo) try{doc.addImage(logo,'PNG',0,0.75,PW,1.20,'logo','FAST')}catch(e){console.warn('Logo:',e)}

  doc.setDrawColor(0); doc.setLineWidth(0.8*PT)
  doc.line(ML,2.05,MR,2.05)

  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(0)
  doc.text('CENTRO MEDICO DE MAR DEL PLATA',CX,2.60,{align:'center'})

  doc.setFont('helvetica','normal'); doc.setFontSize(8)
  doc.text('Apellido',LBL,3.50)

  doc.text('y Nombre',LBL,3.92)
  const lw1=doc.getTextWidth('y Nombre'), vx1=LBL+lw1+0.28
  doc.text((p.nombre||'').slice(0,45),vx1,3.87)
  doc.setLineWidth(0.4*PT); doc.line(vx1,3.92,MR,3.92)

  doc.setLineWidth(0.6*PT); doc.line(ML,4.37,MR,4.37)

  doc.setFont('helvetica','normal'); doc.setFontSize(8)
  doc.text('Nro De Afiliado',LBL,4.87)
  const lw2=doc.getTextWidth('Nro De Afiliado'), vx2=LBL+lw2+0.28
  doc.text((p.num||'').slice(0,30),vx2,4.82)
  doc.setLineWidth(0.4*PT); doc.line(vx2,4.87,MR,4.87)

  doc.text('Entidad',LBL,5.29)
  const lw3=doc.getTextWidth('Entidad'), vx3=LBL+lw3+0.28
  doc.text((p.entidad||'').slice(0,40),vx3,5.24)
  doc.setLineWidth(0.4*PT); doc.line(vx3,5.29,MR,5.29)

  doc.setFont('helvetica','normal'); doc.setFontSize(9)
  doc.text('Rp/',LBL,6.29)

  doc.setFont('helvetica','normal'); doc.setFontSize(8)
  let yc=6.87
  const _tx=LBL+0.35, _mw=MR-_tx
  for(const ln of lineas){
    if(ln&&String(ln).trim()){
      const wls=doc.splitTextToSize(String(ln).trim(),_mw)
      wls.forEach(wl=>{doc.text(wl,_tx,yc);yc+=0.40})
    }
  }

  doc.setFont('helvetica','normal'); doc.setFontSize(7)
  const dgLines=doc.splitTextToSize('Dg: '+(p.diagnostico||''),MR-LBL)
  dgLines.slice(0,3).forEach((l,i)=>doc.text(l,LBL,18.90+i*0.38))
  let ye=19.28
  if(conFechaCirugia&&p.fecha_cirugia){doc.text('Fecha de cirugia: '+p.fecha_cirugia,LBL,ye);ye+=0.38}
  doc.text('Fecha: '+fecha,LBL,ye)

  const sh=4.00, sw=4.00, sx=MR-sw
  const fh=3.00, fw=5.50, fx=sx-0.20-fw
  if(sello) addImgFit(doc,sello,'s_'+sKey,sx,1.20,sw,sh)
  else if(firma) addImgFit(doc,firma,'f_'+sKey,fx,1.20,fw,fh)

  doc.setDrawColor(0); doc.setLineWidth(0.6*PT); doc.line(ML,21.10,MR,21.10)
  doc.setFont('helvetica','bold'); doc.setFontSize(5); doc.setTextColor(0)
  doc.text('CLÍNICA - TE: (0223) 499-2656  -  CONSULTORIOS - TE: (0223) 499-2606/2607',CX,21.55,{align:'center'})
}

function esVacio(s){return !s||['','-','no'].includes(s.trim().toLowerCase())}

function buildOrdenes(p) {
  const esInter=(p.tipo||'').toUpperCase().includes('INTERNACION')
  const matLineas=esVacio(p.material)?[]:[p.material]
  const tieneFer=!esVacio(p.elementos)
  const ords=[
    esInter
      ?{ln:['Derechos Sanatoriales e internacion por:',p.codi],cx:true}
      :{ln:['Honorarios Medicos por:',p.codi],cx:false},
    {ln:['Honorarios Anestesia por:',p.codi],cx:false},
    {ln:['Honorarios Cirujano:',p.nun],cx:false},
    {ln:['Honorarios Ayudante:',p.nun],cx:false},
    {ln:matLineas,cx:false},
  ]
  if(tieneFer) ords.push({ln:[p.elementos],cx:false,diag:'Post-operatorio'})
  return ords
}

function generarBlob(p) {
  if(typeof jsPDF!=='function') throw new Error('jsPDF no cargó. Verificá tu conexión y recargá la página.')
  const doc=new jsPDF({unit:'cm',format:[PW,PH],orientation:'portrait'})
  const ords=buildOrdenes(p)
  ords.forEach((o,i)=>{
    if(i>0) doc.addPage()
    drawPage(doc,o.diag?{...p,diagnostico:o.diag}:p,o.ln,o.cx)
  })
  return doc.output('blob')
}

function generarBlobPreq(p,cardio,clinica) {
  if(typeof jsPDF!=='function') throw new Error('jsPDF no cargó.')
  const doc=new jsPDF({unit:'cm',format:[PW,PH],orientation:'portrait'})
  const estudios=[
    ['Rx Tórax','(F)'],
    ['ECG +','Riesgo Quirúrgico'],
    ['Hemograma Completo','Glucemia','Uremia','Creatininemia','Coagulograma'],
  ]
  if(cardio) estudios.push(['Evaluación cardiológica prequirúrgica'])
  if(clinica) estudios.push(['Evaluación clínica / Apto quirúrgico'])
  estudios.forEach((ln,i)=>{if(i>0) doc.addPage();drawPagePreq(doc,p,ln)})
  return doc.output('blob')
}

function filtrarPendientes(rows){
  return rows.slice(1).reduce((acc,row)=>{
    if(!row.some(c=>c)) return acc
    let ix
    if(row[1]?.trim()) ix={n:1,doc:9,fc:10,pq:14}
    else if(row[17]?.trim()) ix={n:17,doc:25,fc:24,pq:14}
    else return acc
    const aj=(row[35]||'').trim().toUpperCase()
    if(aj==='TRUE'||aj==='1'||aj==='✓'||aj==='SI'||aj==='SÍ') return acc  // tildado → ya procesado
    const g=i=>(row[i]||'').trim()
    const nombre=g(ix.n); if(!nombre) return acc
    acc.push({nombre,doctor:g(ix.doc),fechaCirugia:g(ix.fc),
      necesita_preq:g(ix.pq),key:nombre+'||'+g(ix.doc)})
    return acc
  },[])
}

function _parseFechaStats(s) {
  if (!s) return null
  s = s.trim().split(' ')[0]
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/)
  if (!m) return null
  const [, a, b, y] = m, ai = +a, bi = +b
  if (ai > 12) return `${y}-${b.padStart(2,'0')}-${a.padStart(2,'0')}`
  if (bi > 12) return `${y}-${a.padStart(2,'0')}-${b.padStart(2,'0')}`
  return `${y}-${b.padStart(2,'0')}-${a.padStart(2,'0')}`
}

function _procesarStats(rows, desde, hasta) {
  desde = desde || '2026-05-01'
  hasta = hasta || todayISO()
  const docs = {}, meses = new Set()
  let total = 0, pasaron = 0
  rows.slice(1).forEach(row => {
    if (!row.some(c => c)) return
    total++
    const fechaISO = _parseFechaStats(row[0]||'')
    if (!fechaISO || fechaISO < desde || fechaISO > hasta) return
    pasaron++
    const mes = fechaISO.slice(0, 7)
    meses.add(mes)
    const slots = []
    if (row[1]?.trim())  slots.push({n:1, e:2, nun:7, doc:9, ti:15})
    if (row[17]?.trim()) slots.push({n:17,e:18,nun:23,doc:25,ti:30})
    slots.forEach(ix => {
      const g = i => (row[i]||'').trim()
      if (!g(ix.n)) return
      const doctor = g(ix.doc) || 'Sin doctor'
      const nun    = g(ix.nun) || '—'
      const ent    = g(ix.e)   || '—'
      const esInter = g(ix.ti).toUpperCase().includes('INTERNACION')
      const dk = normalizar(doctor) || doctor.toLowerCase()
      if (!docs[dk]) docs[dk] = {label:doctor, total:0, nuns:{}, ents:{}, meses:{}, inter:0, ambul:0}
      docs[dk].total++
      docs[dk].nuns[nun] = (docs[dk].nuns[nun]||0)+1
      docs[dk].ents[ent] = (docs[dk].ents[ent]||0)+1
      docs[dk].meses[mes] = (docs[dk].meses[mes]||0)+1
      esInter ? docs[dk].inter++ : docs[dk].ambul++
    })
  })
  console.log(`[stats] Filas: ${total} total, ${pasaron} en rango ${desde}→${hasta}`)
  return {docs, meses:[...meses].sort()}
}

function _top(obj, n=6) {
  return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n)
}

function _bars(items, maxV) {

}

function _trendBars(meses, mesMap, maxV, currMes) {
  const labels = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']
  return meses.map(m => {
    const v = mesMap[m]||0
    const h = Math.max(2, Math.round((v/maxV)*44))
    const lbl = labels[+m.split('-')[1]]
    return `<div class="tbar-w">
      <div class="tbar${m===currMes?' curr':''}" style="height:${h}px"></div>
      <div class="tlbl">${lbl}</div>
    </div>`
  }).join('')
}

function _renderStats({docs, meses}) {
  const sorted = Object.values(docs).sort((a,b)=>b.total-a.total)
  if (!sorted.length) {
    const sel = document.getElementById('statsDocFiltro')
    if (sel) sel.innerHTML = '<option value="">Todos</option>'
    document.getElementById('statsContent').innerHTML =
      '<div class="estado" style="display:block">No se encontraron datos en el rango seleccionado.</div>'
    return
  }
  const currMes = new Date().toISOString().slice(0,7)
  const labels  = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']

  // Totales mensuales globales
  const totMes = {}
  sorted.forEach(d => meses.forEach(m => { totMes[m]=(totMes[m]||0)+(d.meses[m]||0) }))
  const maxTotMes = Math.max(1,...Object.values(totMes))

  // NUNs globales
  const allNuns = {}
  sorted.forEach(d => Object.entries(d.nuns).forEach(([k,v])=>{ allNuns[k]=(allNuns[k]||0)+v }))
  const topNuns = _top(allNuns, 10)

  let html = ''

  // Poblar selector de profesional
  const sel = document.getElementById('statsDocFiltro')
  const prevVal = sel.value
  sel.innerHTML = '<option value="">Todos</option>' +
    sorted.map(d => {
      const dk = normalizar(d.label)||d.label.toLowerCase()
      return `<option value="${dk}">${d.label}</option>`
    }).join('')
  if (prevVal) sel.value = prevVal

  // ── Tabla comparativa ──
  const totalCX = sorted.reduce((s,d)=>s+d.total,0)
  const totalIn = sorted.reduce((s,d)=>s+d.inter,0)
  const totalAm = sorted.reduce((s,d)=>s+d.ambul,0)
  html += `<div class="stats-sec">
    <div class="stats-sec-t">Comparativa · ${totalCX} cirugías · ${totalIn} inter · ${totalAm} amb</div>
    <table class="st">
      <tr><th>Profesional</th><th style="text-align:right">CX</th><th style="text-align:right">Int</th><th style="text-align:right">Amb</th><th>Entidad top</th></tr>`
  sorted.forEach(d => {
    const te = _top(d.ents,1)[0]
    const pctI = d.total ? Math.round(d.inter/d.total*100) : 0
    html += `<tr>
      <td class="dn">${d.label}</td>
      <td class="nt">${d.total}</td>
      <td style="text-align:right;font-size:11px;color:#f59e0b">${d.inter}</td>
      <td style="text-align:right;font-size:11px;color:var(--m)">${d.ambul}</td>
      <td style="font-size:11px;color:var(--m)">${te?te[0]:'—'}</td>
    </tr>`
  })
  html += `</table></div>`

  // ── Tendencia global ──
  if (meses.length) {
    html += `<div class="stats-sec">
      <div class="stats-sec-t">Tendencia mensual — total</div>
      <div class="trend">${_trendBars(meses,totMes,maxTotMes,currMes)}</div>
    </div>`
  }

  // ── NUNs más frecuentes ──
  if (topNuns.length) {
    html += `<div class="stats-sec">
      <div class="stats-sec-t">NUN más frecuentes</div>
      <div>${_bars(topNuns, topNuns[0][1])}</div>
    </div>`
  }

  // ── Por profesional ──
  html += `<div style="padding:0 16px 6px;font-size:11px;font-weight:600;color:var(--or);text-transform:uppercase;letter-spacing:.5px;opacity:.7">Por profesional</div>`

  sorted.forEach(d => {
    const topEnts = _top(d.ents, 6), topNunD = _top(d.nuns, 6)
    const maxE = topEnts[0]?.[1]||1, maxN = topNunD[0]?.[1]||1
    const maxM = Math.max(1,...meses.map(m=>d.meses[m]||0))
    const dk = normalizar(d.label)||d.label.toLowerCase()
    const pctI = d.total ? Math.round(d.inter/d.total*100) : 0
    const pctA = 100 - pctI

    html += `<div class="sdc" data-dk="${dk}">
      <div class="sdc-hdr" onclick="
        var b=this.nextElementSibling;b.classList.toggle('open');
        this.querySelector('.sdc-ico').style.transform=b.classList.contains('open')?'rotate(180deg)':''">
        <div class="sdc-name">${d.label}</div>
        <div style="display:flex;align-items:center">
          <div class="sdc-tot">${d.total}</div>
          <span class="sdc-ico">▼</span>
        </div>
      </div>
      <div class="sdc-body">`

    // Internación vs Ambulatorio
    html += `<div class="sdc-sub">Internación vs Ambulatorio</div>
      <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px">
        <div style="flex:${d.inter||0};background:#f59e0b;min-width:${d.inter?'4px':'0'}"></div>
        <div style="flex:${d.ambul||0};background:rgba(255,255,255,.15);min-width:${d.ambul?'4px':'0'}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--m);margin-top:4px">
        <span style="color:#f59e0b">Internación: ${d.inter} (${pctI}%)</span>
        <span>Ambulatorio: ${d.ambul} (${pctA}%)</span>
      </div>`

    if (meses.length) {
      html += `<div class="sdc-sub">Tendencia mensual</div>
        <div class="trend">${_trendBars(meses,d.meses,maxM,currMes)}</div>`
    }
    html += `<div class="sdc-sub">Entidad</div><div>${_bars(topEnts,maxE)}</div>`
    html += `<div class="sdc-sub">NUN</div><div>${_bars(topNunD,maxN)}</div>`
    html += `</div></div>`
  })

  document.getElementById('statsContent').innerHTML = html
  // Reaplicar filtro si hay uno activo
  const vf = document.getElementById('statsDocFiltro').value
  if (vf) filtrarDocStats(vf)
}

function filtrarDocStats(val) {
  let target = null
  document.querySelectorAll('#statsContent .sdc[data-dk]').forEach(card => {
    const show = !val || card.dataset.dk === val
    card.style.display = show ? '' : 'none'
    if (show && val) target = target || card
  })
  if (target) {
    const body = target.querySelector('.sdc-body')
    const ico  = target.querySelector('.sdc-ico')
    if (body && !body.classList.contains('open')) {
      body.classList.add('open')
      if (ico) ico.style.transform = 'rotate(180deg)'
    }
    setTimeout(() => target.scrollIntoView({behavior:'smooth', block:'start'}), 80)
  }
}
</script>
</body>
</html>
